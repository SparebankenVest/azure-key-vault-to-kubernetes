name: Release VaultEnv

on:
  push:
    tags:
      - "vaultenv-[0-9]+.[0-9]+.[0-9]+**"

jobs:
  release:
    runs-on: ubuntu-22.04
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.PUBLIC_REGISTRY_USERNAME }}
          password: ${{ secrets.PUBLIC_REGISTRY_PASSWORD }}

      - name: Setup Cosign
        uses: sigstore/cosign-installer@v3

      - name: Setup ORAS
        uses: oras-project/setup-oras@v1

      - name: Version
        run: make print-v-vaultenv

      - name: Release image
        run: |
          make \
          DOCKER_INTERNAL_REG=${{ secrets.PRIVATE_REGISTRY }} \
          DOCKER_INTERNAL_URL=${{ secrets.PRIVATE_REGISTRY_URL }} \
          DOCKER_INTERNAL_USER=${{ secrets.PRIVATE_REGISTRY_USERNAME }} \
          DOCKER_INTERNAL_PASSW=${{ secrets.PRIVATE_REGISTRY_PASSWORD }} \
          DOCKER_RELEASE_USER=${{ secrets.PUBLIC_REGISTRY_USERNAME }} \
          DOCKER_RELEASE_PASSW=${{ secrets.PUBLIC_REGISTRY_PASSWORD }} \
          DOCKER_RELEASE_REG=${{ secrets.PUBLIC_REGISTRY }} \
          DOCKER_RELEASE_TAG=${GITHUB_REF##*/} \
          release-vaultenv

      - name: Sign released image and attestations
        env:
          RELEASE_REGISTRY: ${{ secrets.PUBLIC_REGISTRY }}
        run: |
          set -euo pipefail

          IMAGE_REF="${RELEASE_REGISTRY}/azure-keyvault-env:${GITHUB_REF_NAME#vaultenv-}"
          cosign sign --yes "$IMAGE_REF"

          docker buildx imagetools inspect --raw "$IMAGE_REF" \
            | jq -r '.manifests[] | select(.platform.architecture == "unknown" and .platform.os == "unknown") | .digest' \
            | while read -r digest; do
                cosign sign --yes "$IMAGE_REF@$digest"
              done

      - name: Extract SPDX SBOMs
        env:
          RELEASE_REGISTRY: ${{ secrets.PUBLIC_REGISTRY }}
        run: |
          set -euo pipefail

          IMAGE_REF="${RELEASE_REGISTRY}/azure-keyvault-env:${GITHUB_REF_NAME#vaultenv-}"
          VERSION="${GITHUB_REF_NAME#vaultenv-}"
          OUT_DIR="dist/sbom"
          mkdir -p "$OUT_DIR"

          INDEX_JSON="$(docker buildx imagetools inspect --raw "$IMAGE_REF")"

          printf '%s' "$INDEX_JSON" \
            | jq -r '.manifests[] | select(.platform.os != "unknown" and .platform.architecture != "unknown") | "\(.platform.os) \(.platform.architecture) \(.digest)"' \
            | while read -r os arch subject_digest; do
                attestation_digest="$(printf '%s' "$INDEX_JSON" | jq -r --arg subject "$subject_digest" '.manifests[] | select(.platform.architecture == "unknown" and .platform.os == "unknown" and .annotations["vnd.docker.reference.type"] == "attestation-manifest" and .annotations["vnd.docker.reference.digest"] == $subject) | .digest')"
                spdx_layer_digest="$(docker buildx imagetools inspect --raw "$IMAGE_REF@$attestation_digest" | jq -r '.layers[] | select(.annotations["in-toto.io/predicate-type"] == "https://spdx.dev/Document") | .digest')"

                oras blob fetch --output - "$IMAGE_REF@$spdx_layer_digest" \
                  | jq '.predicate' \
                  > "$OUT_DIR/azure-keyvault-env_${VERSION}_${os}_${arch}.spdx.json"
              done

      - name: Upload SPDX SBOMs to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/sbom/*.spdx.json
          tag_name: ${{ github.ref_name }}
